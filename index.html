<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edwin Lau</title>
  <meta name="description" content="Edwin Lau">
  <meta property="og:title" content="Edwin Lau">
  <meta property="og:description" content="everything is a win when the goal is experience">
  <meta property="og:image" content="https://edwinlau.com/preview.jpg">
  <meta property="og:url" content="https://edwinlau.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #fafaf8;
      --text: #1a1a1a;
      --text-secondary: #555;
      --link: #1a1a1a;
      --link-hover: #888;
      --rule: #ccc;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --text: #e0ddd8;
        --text-secondary: #999;
        --link: #e0ddd8;
        --link-hover: #777;
        --rule: #333;
      }
    }

    html {
      height: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    main {
      max-width: 360px;
    }

    h1 {
      font-weight: 300;
      font-size: 2.4rem;
      letter-spacing: 0.02em;
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }

    hr {
      border: none;
      border-top: 1px solid var(--rule);
      width: 2.4rem;
      padding: 0.4rem 0;
      margin-bottom: 0.4rem;
      transition: width 0.8s ease;
      cursor: default;
    }

    hr:hover {
      width: 100%;
    }

    p {
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-secondary);
      margin-bottom: 1.6rem;
    }

    nav {
      font-size: 1rem;
      font-weight: 400;
    }

    nav a {
      color: var(--link);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--link-hover);
    }

    nav .sep {
      color: var(--rule);
      margin: 0 0.6rem;
    }
    .tagline-wrap {
      position: relative;
      display: inline-block;
      cursor: default;
    }
    .tagline-orig {
      transition: opacity 0.5s ease;
    }
    .tagline-secret {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      white-space: nowrap;
    }
    .tagline-wrap:hover .tagline-orig { opacity: 0; }
    .tagline-wrap:hover .tagline-secret { opacity: 1; }
  </style>
</head>
<!-- hey :D -->
<body>
  <main>
    <h1>Edwin Lau</h1>
    <hr>
<p>everything is a win when the goal is <span class="tagline-wrap"><span class="tagline-orig">experience</span><span class="tagline-secret">b2b SaaS</span></span></p>
<nav>
      <a href="https://linkedin.com/in/lau-edwin" target="_blank" rel="noopener">LinkedIn</a>      <span class="sep">&middot;</span>
      <a href="mailto:edwin@emsoft.com">Email</a>
      <span class="sep">&middot;</span>
      <a href="https://x.com/lau__edwin" target="_blank" rel="noopener">X</a>
    </nav>
  </main>
</body>
</html>
